<!doctype html>
<html lang="en">
	<head>
		<title>Glorious battery</title>
		<meta charset="utf-8" />
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Python">
			<sdpi-textfield
				setting="pythonPath"
				placeholder="Leave empty: tries py -3, then python (Windows)"
			></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Script path">
			<sdpi-textfield
				setting="scriptPath"
				placeholder="Default: bundled glorious_battery.py"
			></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Poll (sec)">
			<sdpi-range setting="pollSeconds" min="5" max="300" step="5" default="10" showlabels></sdpi-range>
		</sdpi-item>
		<p style="opacity: 0.85; font-size: 12px; margin: 12px 0 0; line-height: 1.35">
			<strong>Key stays blank / no digits?</strong> In Stream Deck, select this key and remove any
			<strong>custom icon</strong> you set. Elgato applies user-picked artwork above the plugin, so
			<code>setImage</code> is ignored until the custom icon is cleared.
		</p>
	</body>
</html>
